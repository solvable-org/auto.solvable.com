name: deploy

on:
  push:
    branches: [main]
  pull_request:

permissions:
  id-token: write # OIDC -> assume the ECR-push role
  contents: read

jobs:
  # PRs just validate the image builds (no AWS, no deploy).
  validate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Docker build (validate)
        run: docker build --provenance=false --sbom=false -t auto-solvable:ci .

  # On push to main: build amd64 image, push to ECR. App Runner auto-deploys :latest.
  deploy:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: ECR login
        run: |
          aws ecr get-login-password --region "${{ vars.AWS_REGION }}" \
            | docker login --username AWS --password-stdin "$(echo "${{ vars.ECR_REPO }}" | cut -d/ -f1)"

      # --provenance=false: App Runner can't run a multi-arch index / attestation manifest,
      # so push a single linux/amd64 image. ubuntu-latest is amd64, so no QEMU needed.
      - name: Build + push (App Runner auto-deploys on :latest)
        run: |
          IMG="${{ vars.ECR_REPO }}"
          docker build --provenance=false --sbom=false --platform linux/amd64 \
            -t "$IMG:latest" -t "$IMG:${{ github.sha }}" .
          docker push "$IMG:latest"
          docker push "$IMG:${{ github.sha }}"
